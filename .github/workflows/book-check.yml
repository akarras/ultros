name: Book Check

on:
    pull_request:

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install mdBook
              run: |
                  set -euo pipefail
                  tag="v0.5.2"
                  url="https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                  mkdir -p "$HOME/mdbook-bin"
                  curl -fsSL "$url" | tar -xz --directory="$HOME/mdbook-bin"
                  echo "$HOME/mdbook-bin" >> "$GITHUB_PATH"


            - name: Build book
              run: |
                  cd userguide
                  mdbook build
