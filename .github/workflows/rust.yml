name: rust

on:
    push:
        branches: ["main"]
        # Publish semver tags as releases.
        tags: ["v*.*.*"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Lint, checks, and tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  submodules: recursive
            - name: Install system packages
              # normally i do an apt upgrade here, but we install snap and firefox??
              run: sudo apt update && sudo apt install -y libfreetype6 libfreetype6-dev cmake build-essential curl sudo pkg-config libssl-dev fontconfig libfontconfig1-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-01-06
                  components: rustfmt, clippy
            - name: Cache cargo registry and build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main

            - name: Install cargo tools
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  install_if_missing() {
                      if ! command -v $1 &> /dev/null; then
                          echo "Installing $1..."
                          cargo binstall --no-confirm $1
                      else
                          echo "$1 is already installed, skipping."
                      fi
                  }
                  install_if_missing cargo-deny
                  install_if_missing cargo-outdated
                  install_if_missing cargo-udeps
                  install_if_missing cargo-audit
                  install_if_missing cargo-pants
            # giving up on this fmt check for now
            # - run: cargo fmt --version
            - name: Check formatting
              run: cargo fmt --all -- --check

            - name: Run Clippy
              # it would be good to support --all-features, but xiv-gen is a little unstable.
              run: cargo clippy --all-targets -- -D warnings

            #- name: Run cargo-deny, outdated, udeps, audit, and pants
            #  run: |
            #      cargo deny check
            #      cargo outdated --exit-code 1
            #      cargo udeps
            #      rm -rf ~/.cargo/advisory-db
            #      cargo audit
            #      cargo pants
            # - name: Run tests
            # --all-features makes sense, but breaks xiv-gen oops.
            # some broken tests that i can't figure out right now.
            # run: cargo test --workspace

    e2e:
        name: E2E screenshot smoke
        needs: check
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: ultros
                    POSTGRES_PASSWORD: ultrosiscool
                    POSTGRES_DB: ultros
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://ultros:ultrosiscool@localhost/ultros
            HOSTNAME: http://localhost:8080
            PORT: "8080"
            # Bot panics on bad token but does not crash the web server (see AGENTS.md).
            DISCORD_TOKEN: dummy-token-for-ci-e2e
            DISCORD_CLIENT_ID: "0"
            DISCORD_CLIENT_SECRET: dummy-secret
            # KEY must be >= 64 chars (cookie encryption key).
            KEY: ci-e2e-cookie-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
            VAPID_PRIVATE_KEY: dummy
            VAPID_PUBLIC_KEY: dummy
            RUST_LOG: warn

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  submodules: recursive
            - name: Install system packages
              run: sudo apt update && sudo apt install -y libfreetype6 libfreetype6-dev cmake build-essential curl sudo pkg-config libssl-dev fontconfig libfontconfig1-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-01-06
            - name: Cache cargo registry and build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@main

            - name: Install cargo-leptos
              run: |
                  if ! command -v cargo-leptos &> /dev/null; then
                      cargo binstall --no-confirm cargo-leptos
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: integration/package-lock.json

            - name: Install E2E npm deps
              working-directory: integration
              run: npm ci

            - name: Run E2E (build server + Puppeteer screenshots + login flow)
              env:
                  LEPTOS_FEATURES: test-auth
              run: ./scripts/run_e2e.sh

            - name: Upload screenshot artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-screenshots
                  path: integration/artifacts/
                  if-no-files-found: ignore
                  retention-days: 14

            - name: Upload server log on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-server-log
                  path: /tmp/ultros-e2e-server.log
                  if-no-files-found: ignore
                  retention-days: 14
